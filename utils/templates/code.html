<link href="https://fonts.googlefonts.cn/css?family=Open+Sans" rel="stylesheet">
<style>
  * {
    font-family: "Open Sans", Ubuntu, Verdana, Nunito, monospace, Consolas, Monospace, sans-serif;
  }
  .im {  /* gmail adapter */
    color: inherit;
  }
  .main {
    width: max-content;
    padding: 60px 35px;
    border: 1px solid lightgray;
    border-radius: 10px;
    margin: 10px auto;
  }
  .column {
    text-align: center;
  }
  h1 {
    margin-top: 4px;
  }
  a {
    text-decoration: none;
    transition: .5s;
    color: #009efd;
  }
  a:active, a:hover {
    color: #0d64fd;
  }
  .logo-image {
    width: 64px;
    height: 64px;
  }
  .prism-logo {
    position: relative;
    width: 64px;
    height: 64px;
    margin: 0 auto;
    line-height: 64px;
    color: #111827;
    font-family: Georgia, "Times New Roman", serif;
    font-size: 52px;
    font-weight: 700;
    letter-spacing: -2px;
  }
  .prism-dot {
    position: absolute;
    right: 8px;
    bottom: 9px;
    width: 14px;
    height: 14px;
    border-radius: 999px;
    background: #3b82f6;
  }
  .code {
    color: #58a6ff;
    font-size: large;
  }
</style>
<body>
<div class="main">
  <div class="column">
    {{if .Logo}}
    <img class="logo-image" src="{{.Logo}}" alt="{{.Title}}">
    {{else}}
    <div class="prism-logo" aria-label="Prism">P<span class="prism-dot"></span></div>
    {{end}}
    <h1>{{.Title}}</h1>
  </div>
  <div class="column"><p>Your One-Time Password is <strong class="code">{{.Code}}</strong></p></div>
  <div class="column" style="color:gray">
    <span>The code will expire in <strong>10 minutes</strong>.</span><br>
    <span>If it is not operated by yourself, please ignore it.</span><br>
  </div>
  <br>
  <div class="column">
    <a href="">&copy; {{.Title}}</a>
  </div>
</div>
</body>
