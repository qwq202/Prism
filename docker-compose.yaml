services:
  mysql:
    image: mysql:latest
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-root}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-chatnio}"
      MYSQL_USER: "${MYSQL_USER:-chatnio}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-chatnio123456!}"
      TZ: Asia/Shanghai
    expose:
      - "3306"
    volumes:
      - ./db:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", 'mysqladmin ping -h 127.0.0.1 -u root -p"$${MYSQL_ROOT_PASSWORD}"']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - chatnio-network

  redis:
    image: redis:latest
    restart: always
    expose:
      - "6379"
    volumes:
      - ./redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - chatnio-network

  chatnio:
    image: qunqin45/prism:${PRISM_IMAGE_TAG:-latest}
    restart: always
    ports:
      - "8000:8094"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: "${MYSQL_USER:-chatnio}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-chatnio123456!}"
      MYSQL_DB: "${MYSQL_DATABASE:-chatnio}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      SECRET: "${SECRET:-}"
      ROOT_INITIAL_PASSWORD: "${ROOT_INITIAL_PASSWORD:-}"
      SERVE_STATIC: "true"
    volumes:
      - ./config:/config
      - ./logs:/logs
      - ./storage:/storage
    networks:
      - chatnio-network

networks:
  chatnio-network:
    driver: bridge
